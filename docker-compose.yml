services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobs
      POSTGRES_DB: jobs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  migrate:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://jobs:jobs@postgres:5432/jobs
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

  users-sync:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    command: python -m app.users.sync
    environment:
      DATABASE_URL: postgresql+psycopg://jobs:jobs@postgres:5432/jobs
      REDIS_URL: redis://redis:6379/0
    # Dev-only fixed keys, inlined here instead of a git-ignored secret file
    # -- fine to commit since these are throwaway local values, never real
    # credentials (production uses real generated keys in an OpenShift
    # Secret; see deploy/openshift/init-secrets.sh). Mounted at the path
    # Settings.api_user_keys_file already defaults to.
    configs:
      - source: api_user_keys
        target: /run/secrets/api_user_keys
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    environment:
      DATABASE_URL: postgresql+psycopg://jobs:jobs@postgres:5432/jobs
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ready').status==200 else 1)"]
      interval: 15s
      timeout: 12s
      retries: 5
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      users-sync:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    command: python -m app.worker
    restart: on-failure
    stop_grace_period: 50s
    environment:
      DATABASE_URL: postgresql+psycopg://jobs:jobs@postgres:5432/jobs
      REDIS_URL: redis://redis:6379/0
      HEALTH_PORT: "8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 15s
      timeout: 12s
      retries: 5
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  ticker:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    command: python -m app.ticker
    restart: on-failure
    stop_grace_period: 15s
    environment:
      DATABASE_URL: postgresql+psycopg://jobs:jobs@postgres:5432/jobs
      REDIS_URL: redis://redis:6379/0
      HEALTH_PORT: "8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 15s
      timeout: 12s
      retries: 5
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:

configs:
  api_user_keys:
    content: |
      {"alice": "dev-alice-local-only", "bob": "dev-bob-local-only"}
