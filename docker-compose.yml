services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobs
      POSTGRES_DB: jobs
      APP_DB_PASSWORD: jobs_app
      MIGRATOR_DB_PASSWORD: jobs_migrator
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/chart/jobprocessor/files/db-init/01-roles.sh:/docker-entrypoint-initdb.d/01-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  migrate:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://jobs_migrator:jobs_migrator@postgres:5432/jobs
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

  fake-tokenreview:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    # Dev-only stand-in for the cluster apiserver's TokenReview endpoint.
    # Baked-in tokens: dev-alice / dev-bob (see tests/support/fake_tokenreview.py).
    command: python -m tests.support.fake_tokenreview
    environment:
      PORT: "8443"
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8443/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    environment:
      DATABASE_URL: postgresql+psycopg://jobs_app:jobs_app@postgres:5432/jobs
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_ALLOWED_HOSTS: '["example.com"]'
      EMAIL_ALLOWED_DOMAINS: '["example.com"]'
      AUTH_TOKENREVIEW_URL: http://fake-tokenreview:8443/apis/authentication.k8s.io/v1/tokenreviews
    ports:
      - "8000:8000"
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ready').status==200 else 1)"]
      interval: 15s
      timeout: 12s
      retries: 5
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      fake-tokenreview:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    command: python -m app.worker
    restart: on-failure
    stop_grace_period: 50s
    environment:
      DATABASE_URL: postgresql+psycopg://jobs_app:jobs_app@postgres:5432/jobs
      REDIS_URL: redis://redis:6379/0
      HEALTH_PORT: "8001"
      WEBHOOK_ALLOWED_HOSTS: '["example.com"]'
      EMAIL_ALLOWED_DOMAINS: '["example.com"]'
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 15s
      timeout: 12s
      retries: 5
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  ticker:
    build: .
    image: jobprocessor-app:${APP_TAG:-dev}
    command: python -m app.ticker
    restart: on-failure
    stop_grace_period: 15s
    environment:
      DATABASE_URL: postgresql+psycopg://jobs_app:jobs_app@postgres:5432/jobs
      REDIS_URL: redis://redis:6379/0
      HEALTH_PORT: "8001"
      WEBHOOK_ALLOWED_HOSTS: '["example.com"]'
      EMAIL_ALLOWED_DOMAINS: '["example.com"]'
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 15s
      timeout: 12s
      retries: 5
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
