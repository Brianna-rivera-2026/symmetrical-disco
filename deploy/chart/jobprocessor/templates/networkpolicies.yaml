{{- $labels := include "jobprocessor.labels" . }}
# ---------- default deny everything, both directions ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jobprocessor.fullname" . }}-default-deny
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# ---------- DNS egress for every pod ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jobprocessor.fullname" . }}-allow-dns
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - { protocol: UDP, port: 5353 }
        - { protocol: TCP, port: 5353 }
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# ---------- router -> api (the only external path) ----------
# kubelet probe traffic is not subject to NetworkPolicy on OVN-Kubernetes,
# so probe ports need no explicit allow.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jobprocessor.fullname" . }}-api-ingress
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
      ports:
        - { protocol: TCP, port: 8000 }
---
# ---------- apps -> pgbouncer / redis / otel ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jobprocessor.fullname" . }}-app-egress
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [api, worker, ticker]
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: pgbouncer
      ports:
        - { protocol: TCP, port: 6432 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
      ports:
        - { protocol: TCP, port: 6379 }
    {{- if .Values.otel.enabled }}
    # The OTLP collector is run independently by the platform/observability
    # team (outside this chart, possibly a different namespace or even off
    # cluster) -- its pod labels aren't ours to select on, so this allows
    # egress to otel.exporterEndpoint's port from any destination.
    - ports:
        - { protocol: TCP, port: 4317 }
    {{- end }}
---
{{- if .Values.worker.internetEgress.enabled }}
# ---------- worker -> public internet (webhook delivery) ----------
# ipBlock allows 0.0.0.0/0 minus private/cluster/metadata ranges, so a
# compromised or SSRF-driven webhook job cannot reach cluster-internal
# services even if the application-level host allowlist is misconfigured.
# Default OpenShift pod (10.128.0.0/14) and service (172.30.0.0/16) CIDRs
# fall inside the RFC1918 exceptions.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jobprocessor.fullname" . }}-worker-internet-egress
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: worker
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              {{- range .Values.worker.internetEgress.deniedCidrs }}
              - {{ . }}
              {{- end }}
      ports:
        - { protocol: TCP, port: 443 }
---
{{- end }}
# ---------- pgbouncer: in from apps, out to postgres ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jobprocessor.fullname" . }}-pgbouncer
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: pgbouncer
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: [api, worker, ticker]
      ports:
        - { protocol: TCP, port: 6432 }
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
      ports:
        - { protocol: TCP, port: 5432 }
---
# ---------- postgres: in from pgbouncer AND hook jobs (spec: hooks bypass pooling) ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jobprocessor.fullname" . }}-postgres-ingress
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: [pgbouncer, hook]
      ports:
        - { protocol: TCP, port: 5432 }
---
# ---------- redis: in from apps ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jobprocessor.fullname" . }}-redis-ingress
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: redis
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: [api, worker, ticker]
      ports:
        - { protocol: TCP, port: 6379 }
    {{- if .Values.keda.enabled }}
    # KEDA's operator lives in a different namespace (openshift-keda) and
    # polls Redis directly for stream lag -- verified live on CRC that
    # without this, the ScaledObject never goes Ready (dial tcp timeout).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-keda
          podSelector:
            matchLabels:
              app: keda-operator
      ports:
        - { protocol: TCP, port: 6379 }
    {{- end }}
---
# ---------- hook jobs -> postgres ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jobprocessor.fullname" . }}-hook-egress
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: hook
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
      ports:
        - { protocol: TCP, port: 5432 }
