apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jobprocessor.fullname" . }}-pgbouncer-ini
  labels:
    {{- include "jobprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
data:
  # Hand-written, replacing edoburu/pgbouncer's auto-generated pgbouncer.ini:
  # its entrypoint always emits `user = postgres` (setuid after start), which
  # fails under OpenShift's restricted SCC (arbitrary non-root UID, no
  # setuid) with "failed to assume identity of user 'postgres': Operation
  # not permitted" -- verified live on CRC. The entrypoint only auto-writes
  # this file when it's absent, so shipping our own skips that code path.
  pgbouncer.ini: |
    [databases]
    {{ .Values.postgres.database }} = host={{ include "jobprocessor.postgresHost" . }} port=5432

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    unix_socket_dir =
    auth_file = /etc/pgbouncer/userlist.txt
    auth_type = scram-sha-256
    pool_mode = transaction
    max_client_conn = {{ .Values.pgbouncer.maxClientConn }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize }}
    ignore_startup_parameters = extra_float_digits
    server_tls_sslmode = verify-full
    server_tls_ca_file = /etc/pki/service-ca/ca.crt
    {{- if .Values.tls.appToPgbouncer }}
    client_tls_sslmode = require
    client_tls_cert_file = /certs/tls.crt
    client_tls_key_file = /certs/tls.key
    {{- end }}
