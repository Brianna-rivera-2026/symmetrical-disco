apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobprocessor.fullname" . }}-api
  labels:
    {{- include "jobprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "jobprocessor.labels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "jobprocessor.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # overrides the image CMD (plain-HTTP uvicorn) to serve TLS with the
          # service-CA serving cert, so the Route can re-encrypt to the pod
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000",
                    "--ssl-certfile", "/etc/pki/serving-cert/tls.crt",
                    "--ssl-keyfile", "/etc/pki/serving-cert/tls.key"]
          env:
            {{- include "jobprocessor.appEnv" . | nindent 12 }}
            - name: DB_POOL_SIZE
              value: {{ .Values.api.dbPoolSize | quote }}
            - name: FORWARDED_ALLOW_IPS
              value: "*"   # trusts XFF from any peer the netpol admits (the router); this
                           # authenticates the immediate connection, not the XFF chain
                           # contents -- IP-based rate-limit fallback (unauthenticated
                           # /stats only) is best-effort, not a hard guarantee
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            {{- include "jobprocessor.caVolumeMount" . | nindent 12 }}
            - name: serving-cert
              mountPath: /etc/pki/serving-cert
              readOnly: true
      volumes:
        {{- include "jobprocessor.caVolume" . | nindent 8 }}
        - name: serving-cert
          secret:
            secretName: {{ include "jobprocessor.fullname" . }}-api-tls
            defaultMode: 0640
