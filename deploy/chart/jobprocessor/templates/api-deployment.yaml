apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobprocessor.fullname" . }}-api
  labels:
    {{- include "jobprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "jobprocessor.labels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "jobprocessor.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # image CMD already runs uvicorn app.main:app on :8000
          env:
            {{- include "jobprocessor.appEnv" . | nindent 12 }}
            - name: DB_POOL_SIZE
              value: {{ .Values.api.dbPoolSize | quote }}
            - name: FORWARDED_ALLOW_IPS
              value: "*"   # trusts XFF from any peer the netpol admits (the router); this
                           # authenticates the immediate connection, not the XFF chain
                           # contents -- IP-based rate-limit fallback (unauthenticated
                           # /stats only) is best-effort, not a hard guarantee
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            {{- include "jobprocessor.caVolumeMount" . | nindent 12 }}
      volumes:
        {{- include "jobprocessor.caVolume" . | nindent 8 }}
