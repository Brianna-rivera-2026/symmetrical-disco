{{- if .Values.otel.enabled }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "jobprocessor.fullname" . }}-otel
  labels:
    {{- include "jobprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  mode: deployment
  replicas: 1
  # No CRD field exists (checked live against the installed operator via
  # `oc explain opentelemetrycollector.spec --recursive`) to add extra labels
  # to the collector's own pods, so NetworkPolicies target the operator's
  # own default labels instead (app.kubernetes.io/component: opentelemetry-collector).
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      batch: {}
    exporters:
      debug:
        verbosity: basic
      {{- if .Values.otel.exporterEndpoint }}
      otlp:
        endpoint: {{ .Values.otel.exporterEndpoint }}
        tls:
          insecure: true
      {{- end }}
    service:
      pipelines:
        {{- $exporters := ternary (list "debug" "otlp") (list "debug") (ne .Values.otel.exporterEndpoint "") }}
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: {{ $exporters | toJson }}
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: {{ $exporters | toJson }}
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: {{ $exporters | toJson }}
{{- end }}
