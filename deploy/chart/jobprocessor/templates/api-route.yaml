apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "jobprocessor.fullname" . }}-api
  labels:
    {{- include "jobprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  to:
    kind: Service
    name: {{ include "jobprocessor.fullname" . }}-api
  port:
    targetPort: https
  tls:
    # router re-encrypts to the pod's service-CA serving cert; the router
    # trusts the service CA implicitly, so no destinationCACertificate.
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
