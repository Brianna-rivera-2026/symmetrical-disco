apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "jobprocessor.fullname" . }}-api
  labels:
    {{- include "jobprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  # Only the job API is public. /health, /ready and /stats stay
  # cluster-internal: probes hit the pod directly via the kubelet, and the
  # router answers anything outside /jobs with its own 503 (no route match).
  path: /jobs
  to:
    kind: Service
    name: {{ include "jobprocessor.fullname" . }}-api
  port:
    targetPort: https
  tls:
    # router re-encrypts to the pod's service-CA serving cert; the router
    # trusts the service CA implicitly, so no destinationCACertificate.
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
