apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "jobprocessor.fullname" . }}-users-sync
  labels:
    {{- include "jobprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: hook
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "-5"   # after migrate (weight -10)
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "jobprocessor.labels" . | nindent 8 }}
        app.kubernetes.io/component: hook
    spec:
      restartPolicy: Never
      containers:
        - name: users-sync
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "app.users.sync"]
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobprocessor.fullname" . }}-credentials
                  key: db-password
            - name: DATABASE_URL
              value: {{ include "jobprocessor.directDatabaseUrl" . | quote }}
            - name: REDIS_URL
              value: rediss://unused:6379/0
            # CRI-O bind-mounts RHEL entitlement secrets over /run/secrets on
            # every container (host-level default mount), shadowing any pod
            # volume mounted at that exact path — verified live on CRC. Mount
            # elsewhere and point Settings at it instead.
            - name: API_USER_KEYS_FILE
              value: /etc/jobprocessor-secrets/api_user_keys
          volumeMounts:
            {{- include "jobprocessor.caVolumeMount" . | nindent 12 }}
            - name: api-user-keys
              mountPath: /etc/jobprocessor-secrets
              readOnly: true
      volumes:
        {{- include "jobprocessor.caVolume" . | nindent 8 }}
        - name: api-user-keys
          secret:
            secretName: {{ .Values.secrets.apiUserKeysSecret }}
            items:
              - key: api_user_keys.json
                path: api_user_keys
