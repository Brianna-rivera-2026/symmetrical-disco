{{- $name := printf "%s-credentials" (include "jobprocessor.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $dbPass := randAlphaNum 32 }}
{{- $redisPass := randAlphaNum 32 }}
{{- $appDbPass := randAlphaNum 32 }}
{{- $migratorDbPass := randAlphaNum 32 }}
{{- if $existing }}
{{- $dbPass = index $existing.data "db-password" | b64dec }}
{{- $redisPass = index $existing.data "redis-password" | b64dec }}
{{- with index $existing.data "db-app-password" }}{{ $appDbPass = . | b64dec }}{{ end }}
{{- with index $existing.data "db-migrator-password" }}{{ $migratorDbPass = . | b64dec }}{{ end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "jobprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: credentials
  annotations:
    # Hook so the secret is reconciled BEFORE the migrate hook
    # (weight -10) references its keys: a plain manifest would only be
    # applied after pre-upgrade hooks, deadlocking upgrades that introduce
    # new keys. lookup() above runs at render time, so existing passwords
    # survive the before-hook-creation delete/recreate. Trade-off: as a hook
    # resource this secret is no longer deleted by `helm uninstall` -- fine
    # here, credentials surviving a reinstall is a feature (Postgres volume
    # keeps the old passwords).
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
    # keep: without it, the one-time upgrade that moves this resource from
    # plain manifest to hook ends with Helm garbage-collecting it as
    # "removed from release" right after the hooks ran (verified live).
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  db-password: {{ $dbPass | quote }}
  redis-password: {{ $redisPass | quote }}
  db-app-password: {{ $appDbPass | quote }}
  db-migrator-password: {{ $migratorDbPass | quote }}
