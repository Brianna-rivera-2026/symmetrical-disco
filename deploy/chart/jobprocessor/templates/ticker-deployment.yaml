apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobprocessor.fullname" . }}-ticker
  labels:
    {{- include "jobprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: ticker
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "jobprocessor.labels" . | nindent 6 }}
      app.kubernetes.io/component: ticker
  template:
    metadata:
      labels:
        {{- include "jobprocessor.labels" . | nindent 8 }}
        app.kubernetes.io/component: ticker
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: ticker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "app.ticker"]
          resources:
            {{- toYaml .Values.ticker.resources | nindent 12 }}
          env:
            {{- include "jobprocessor.appEnv" . | nindent 12 }}
            - name: DB_POOL_SIZE
              value: {{ .Values.ticker.dbPoolSize | quote }}
            - name: HEALTH_PORT
              value: "8001"
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
          volumeMounts:
            {{- include "jobprocessor.caVolumeMount" . | nindent 12 }}
      volumes:
        {{- include "jobprocessor.caVolume" . | nindent 8 }}
